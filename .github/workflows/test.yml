name: CI Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        env:
          NODE_OPTIONS: --require=./patch-netuse.cjs
          ESBUILD_BINARY_PATH: ${{ github.workspace }}/node_modules/esbuild/bin/esbuild
          TMP: .tmp
          TEMP: .tmp
        run: npm test
